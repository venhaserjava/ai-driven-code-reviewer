# version: '3.8'

services:
  # === BANCO DE DADOS POSTGRESQL ===
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-reviewer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reviewer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reviewer-network

  # === APACHE KAFKA (CLUSTER) ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-reviewer
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - reviewer-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-reviewer
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-reviewer:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - reviewer-network

  # === KAFDROP (INTERFACE VISUAL KAFKA) ===
  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: kafdrop-reviewer
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - reviewer-network

volumes:
  postgres_data:

networks:
  reviewer-network:
    driver: bridge